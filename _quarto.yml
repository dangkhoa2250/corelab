project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "posts/**/*.qmd"
    - "pages/**/*.qmd"
    - "!templates/**"

website:
  title: "corelab"
  description: "Blog ve toan, AI, hinh minh hoa, va animation."
  favicon: assets/images/favicon.png
  navbar:
    logo: assets/images/logo.png
    pinned: true
    right:
      - href: index.qmd
        text: About
      - href: pages/blog.qmd
        text: Blog
      - href: pages/topics.qmd
        text: Topics
      - href: pages/projects.qmd
        text: Projects
  search:
    location: navbar
    type: overlay
  page-footer:
    center: "© Copyright 2026 corelab."

format:
  html:
    theme: cosmo
    css: styles.css
    include-in-header: scripts/theme-init.js
    include-after-body: scripts/navbar-enhancements.js
    toc: true
    code-copy: true
    anchor-sections: true

execute:
  freeze: auto

bibliography: refs/bibliography.bib
